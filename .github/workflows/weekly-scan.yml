name: Weekly commentary scan

on:
  schedule:
    # 8:00 a.m. America/Toronto during daylight time. Adjust to 13:00 UTC in winter if exact timing matters.
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: Scan mode
        type: choice
        required: true
        default: weekly
        options:
          - daily
          - weekly
      analysis_mode:
        description: Analysis mode
        type: choice
        required: true
        default: source-only
        options:
          - source-only
          - ai

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event.inputs.mode || 'weekly' }}
      ANALYSIS_MODE: ${{ github.event.inputs.analysis_mode || 'source-only' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scripts/generate_brief.py --mode "$MODE" --analysis-mode "$ANALYSIS_MODE" --send-email

      - name: Upload brief artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commentary-brief-${{ env.MODE }}-${{ env.ANALYSIS_MODE }}
          path: |
            latest_brief.md
            outputs/*.md
